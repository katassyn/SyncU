name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - run: bun install

      - name: "API: build"
        run: bun run --filter=@syncu/api build

      - name: "API: typecheck"
        run: bun run --filter=@syncu/api typecheck

      - name: "API: test"
        run: bun run --filter=@syncu/api test

      - name: "Web: build"
        run: bun run --filter=@syncu/web build
